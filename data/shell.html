      html {

      body {
        min-height: 100%;
        margin: 0px;
        overflow: hidden;
        background-color: #1f1f28;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      canvas.emscripten {
        border: 0px none;
        background-color: #1f1f28;
        max-width: 100%;
        max-height: 100vh;
      }
    </style>

  <body>
    <canvas
      class="emscripten"
      id="canvas"
      oncontextmenu="event.preventDefault()"
      tabindex="-1"
    ></canvas>
    <p id="output" />
    <script>
      var Module = {
        noInitialRun: true,
        print: (function () {
          var element = document.getElementById("output");
          if (element) element.value = ""; // clear browser cache
          return function (text) {
            if (arguments.length > 1)
              text = Array.prototype.slice.call(arguments).join(" ");
            console.log(text);
            if (element) {
              element.value += text + "\n";
              element.scrollTop = element.scrollHeight; // focus on bottom
            }
          };
        })(),
        canvas: (function () {
          var canvas = document.getElementById("canvas");
          return canvas;
        })(),
        onRuntimeInitialized: function () {
          FS.mkdir("/data");
          FS.mount(IDBFS, { autoPersist: true }, "/data");

          // seems to be the only call of FS.syncfs required thanks to autoPersist: true
          FS.syncfs(true, function (err) {
            if (err) {
              console.error("Error syncing FS:", err);
            } else {
              console.log("FS synced");
              this.callMain();
            }
          });
        },
      };
    </script>
    {{{ SCRIPT }}}
